services:
  postgres:
    image: postgres:17-alpine
    container_name: specforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: specforge
    ports:
      - "5433:5432"
    volumes:
      - specforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d specforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  specforge_postgres_data:
